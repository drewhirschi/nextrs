<div class="docs">
  <aside class="docs-sidebar">
    {% for section in sections %}
    <div class="group">
      <div class="group-label">{{ section.name }}</div>
      {% for doc in section.items %}
      <a href="/docs/{{ doc.slug }}">{{ doc.title }}</a>
      {% endfor %}
    </div>
    {% endfor %}
    <div class="group">
      <div class="group-label">For LLMs</div>
      <a href="/llms.txt">llms.txt</a>
      <a href="/llms-full.txt">llms-full.txt</a>
    </div>
  </aside>

  <div class="docs-main">
    {{ children|safe }}
  </div>

  <nav class="docs-toc" aria-label="On this page">
    <div class="group-label">On this page</div>
    <div id="toc-list"></div>
  </nav>
</div>

<script>
  // Layouts only receive child HTML, so active state + the "On this page" TOC
  // are resolved client-side from the rendered content.
  (function () {
    var path = location.pathname.replace(/\/+$/, "");
    document.querySelectorAll(".docs-sidebar a").forEach(function (a) {
      if (a.getAttribute("href") === path) a.classList.add("active");
    });

    var prose = document.querySelector(".docs-main .prose");
    var toc = document.getElementById("toc-list");
    var tocWrap = document.querySelector(".docs-toc");
    if (!prose || !toc) { if (tocWrap) tocWrap.style.display = "none"; return; }

    var heads = prose.querySelectorAll("h2, h3");
    heads.forEach(function (h) {
      if (!h.id) {
        h.id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
      }
      var a = document.createElement("a");
      a.href = "#" + h.id;
      a.textContent = h.textContent;
      if (h.tagName === "H3") a.style.paddingLeft = "12px";
      toc.appendChild(a);
    });
    if (!toc.childElementCount && tocWrap) tocWrap.style.display = "none";
  })();
</script>
