<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nextrs example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fafafa; font-family: system-ui, sans-serif; min-height: 100vh; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: ui-monospace, SFMono-Regular, monospace; }
    nav { padding: 1rem 2rem; border-bottom: 1px solid #262626; display: flex; gap: 1.5rem; align-items: center; }
    nav .brand { font-weight: 600; color: #fff; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">nextrs</a>
    <a href="/simple">1. Page</a>
    <a href="/with-loading">2. + Loading</a>
    <a href="/with-layout">3. + Layout</a>
  </nav>
  <div id="content">
    {{ children|safe }}
  </div>
</body>
</html>
