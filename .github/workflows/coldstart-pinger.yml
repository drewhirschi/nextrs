# Fleet cold-start telemetry. Every 2 hours (with random jitter so samples
# never align with the hour), fires a concurrent burst per app — page + api
# targets — and POSTs the batch to the docs site's authenticated ingestion
# endpoint (/api/coldstarts → Turso `nextrs-metrics`). Aggregates are public
# at GET /api/coldstarts and rendered live on the site.
#
# History: before 2026-07-14 samples were committed to the `metrics` branch;
# that data was backfilled into Turso and the branch is now an archive.
name: coldstart-pinger

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

concurrency:
  group: coldstart-pinger
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Random jitter (skipped on manual runs)
        if: github.event_name == 'schedule'
        run: sleep $(( RANDOM % 2400 ))

      - name: Burst the fleet
        run: node metrics/ping.mjs > /tmp/batch.ndjson && wc -l /tmp/batch.ndjson

      - name: POST batch to the ingestion endpoint
        run: |
          jq -s '.' /tmp/batch.ndjson > /tmp/batch.json
          code=$(curl -s -o /tmp/ingest-resp.txt -w '%{http_code}' \
            -X POST https://nextrs-docs.vercel.app/api/coldstarts \
            -H "x-api-key: ${{ secrets.METRICS_API_KEY }}" \
            -H 'content-type: application/json' \
            --data @/tmp/batch.json)
          cat /tmp/ingest-resp.txt; echo
          [ "$code" = "200" ] || { echo "ingest failed: $code"; exit 1; }
