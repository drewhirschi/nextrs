# Pin the toolchain for the Vercel build. Without it the build image picks its
# own rustc, and the pinned rolldown =1.1.0 (tsx bundler) fails to compile on
# newer stables (E0310 in rolldown_resolver). 1.96.0 is what the workspace is
# developed and verified on (matches site/).
[toolchain]
channel = "1.96.0"
